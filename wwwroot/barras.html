<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Barras · Cashless</title>

  <script defer src="common.js"></script>
  <script defer src="barras.js"></script>

  <style>
    :root{
      --bg:#0b0b0f; --card:#151520; --muted:#9aa0a6; --txt:#fff;
      --blue:#2f7cff; --alt:#2a2a3a; --red:#ff5a5a; --green:#35ff7a;
      --border:#232336; --field:#0f0f16;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--txt)}
    .wrap{max-width:1200px;margin:0 auto;padding:18px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .title{font-size:28px;font-weight:1000}
    .muted{color:var(--muted);font-size:13px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-top:12px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .field{background:var(--field);border:1px solid var(--border);color:#fff;border-radius:12px;padding:10px 12px;outline:none}
    .btn{border:0;cursor:pointer;font-weight:900;padding:10px 14px;border-radius:12px;background:var(--blue);color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
    .btn.alt{background:var(--alt)}
    .btn.danger{background:var(--red)}
    .btn.small{padding:8px 12px;border-radius:10px;font-size:13px}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:900}
    .pill.ok{background:rgba(53,255,122,.12);border:1px solid rgba(53,255,122,.25);color:#b8ffd2}
    .pill.bad{background:rgba(255,90,90,.12);border:1px solid rgba(255,90,90,.25);color:#ffd1d1}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:top}
    th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#cfd3da;text-align:left}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    hr{border:0;border-top:1px solid var(--border);margin:12px 0}
  </style>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/site.css">
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">Barras</div>
        <div class="muted">Ver / crear / editar / desactivar barras. “Tipo custom” te sirve para VIP, Staff, etc.</div>
      </div>

      <div id="appMenu" class="row"></div>
      <div class="row">
        <button id="btnReload" class="btn alt">Recargar</button>
        <button id="btnLogout" class="btn danger">Cerrar sesión</button>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:1000">Crear nueva barra</div>
      <div class="muted">Se guarda en <span class="mono">/api/areas</span>. Type = Barra/Stand/General. CustomType = libre (VIP, Backstage...).</div>

      <div class="row" style="margin-top:10px">
        <input id="name" class="field" style="flex:1;min-width:240px" placeholder="Nombre (ej. Barra 2, Merch, Cocina)" />
        <select id="type" class="field" style="width:160px">
          <option value="Barra">Barra</option>
          <option value="Stand">Stand</option>
          <option value="General">General</option>
        </select>
        <input id="customType" class="field" style="min-width:220px;flex:1" placeholder="Tipo custom (opcional) ej: VIP, Staff" />
        <label class="muted" style="display:flex;gap:8px;align-items:center">
          <input id="active" type="checkbox" checked />
          Activa
        </label>
        <button id="btnCreate" class="btn">Crear</button>
      </div>

      <div id="msg" class="muted" style="margin-top:10px;min-height:18px"></div>

      <hr />

      <div class="row" style="justify-content:space-between">
        <div class="row">
          <input id="q" class="field" style="min-width:260px" placeholder="Buscar por nombre/tipo..." />
          <label class="muted" style="display:flex;gap:8px;align-items:center">
            <input id="showInactive" type="checkbox" />
            Mostrar inactivas
          </label>
        </div>
        <div class="muted">Total: <span id="count">0</span></div>
      </div>
    </div>

    <div class="card">
      <div style="overflow:auto">
        <table>
          <thead>
            <tr>
              <th style="width:80px">ID</th>
              <th>Nombre</th>
              <th style="width:140px">Type</th>
              <th style="width:220px">CustomType</th>
              <th style="width:140px">Estado</th>
              <th style="width:360px">Acciones</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
