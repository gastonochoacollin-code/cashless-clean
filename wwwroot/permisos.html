<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Permisos por Rol | Cashless</title>
  <style>
    :root{
      --bg:#0b0b0f; --card:#151520; --muted:#9aa0a6; --txt:#fff;
      --blue:#2f7cff; --alt:#2a2a3a; --line:#22223a; --field:#0f0f16;
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{margin:0;background:var(--bg);color:var(--txt)}
    .wrap{width:min(1320px,96vw);margin:24px auto;padding:0 0 32px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .brand{display:flex;flex-direction:column;gap:4px}
    .muted{color:var(--muted);font-size:12px}
    h1{margin:0;font-size:30px}
    .btn{border:0;border-radius:10px;padding:10px 12px;background:#202033;color:#fff;cursor:pointer;font-weight:800}
    .btn.blue{background:var(--blue)}
    .btn.alt{background:var(--alt)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .card{background:linear-gradient(180deg,#141423,#0f0f16);border:1px solid var(--line);border-radius:18px;padding:16px}
    .status{padding:12px 14px;border-radius:12px;border:1px solid #2a2a3a;background:#111122;color:#dfe6ff;margin-bottom:14px}
    .status.ok{border-color:rgba(53,255,122,.35);background:rgba(53,255,122,.06)}
    .status.warn{border-color:rgba(255,197,92,.35);background:rgba(255,197,92,.06);color:#ffe8b8}
    .status.err{border-color:rgba(255,90,90,.35);background:rgba(255,90,90,.07);color:#ffd1d1}
    table{width:100%;border-collapse:separate;border-spacing:0}
    thead th{position:sticky;top:0;background:#121226;border-bottom:1px solid #2a2a3a;padding:10px;font-size:11px;color:#b7c0ff;text-transform:uppercase;letter-spacing:.08em}
    tbody td{border-bottom:1px solid #1f1f33;padding:12px 10px;vertical-align:top}
    .perm-title{font-weight:700}
    .perm-desc{font-size:12px;color:var(--muted);margin-top:2px}
    .toggle{width:18px;height:18px;accent-color:#2f7cff;cursor:pointer}
    .foot{margin-top:10px;color:var(--muted);font-size:12px}
  </style>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/site.css">
</head>
<body>
  <div class="wrap">
    <div id="appMenu" class="row" style="margin-bottom:12px"></div>
    <div class="top">
      <div class="brand">
        <div class="muted">Cashless</div>
        <h1>Permisos por rol</h1>
        <div class="muted">Editable en frontend para la UI actual. Solo SuperAdmin puede guardar cambios.</div>
      </div>
      <div class="row">
        <a class="btn alt" href="/asignacion-roles.html">Asignar roles</a>
        <button class="btn" id="btnReset">Restaurar base</button>
        <button class="btn blue" id="btnSave">Guardar cambios</button>
      </div>
    </div>

    <div class="card">
      <div id="status" class="status">Listo.</div>
      <div style="overflow:auto">
        <table id="tbl">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="foot">Los cambios se guardan en este navegador y afectan la navegacion/UI del frontend sin tocar el backend.</div>
    </div>
  </div>
  <script src="common.js"></script>
  <script src="permisos.js"></script>
</body>
</html>
