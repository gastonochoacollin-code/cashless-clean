<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menús · Cashless</title>
  <style>
    :root{
      --bg:#0b0b0f; --card:#151520; --muted:#9aa0a6; --txt:#fff;
      --blue:#2f7cff; --alt:#2a2a3a; --red:#ff5a5a; --green:#35ff7a;
      --field:#0f0f16; --stroke:#232335;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--txt)}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1200px;margin:0 auto;padding:18px}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px}
    .brand{display:flex;flex-direction:column}
    .brand b{font-size:18px}
    .brand span{color:var(--muted);font-size:12px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{border:0;border-radius:12px;padding:10px 12px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}
    .btn.alt{background:var(--alt)}
    .btn.danger{background:var(--red)}
    .card{background:var(--card);border:1px solid var(--stroke);border-radius:16px;padding:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media (max-width: 980px){ .grid{grid-template-columns:1fr} }
    .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .h h2{margin:0;font-size:15px}
    .muted{color:var(--muted);font-size:12px}
    .field, select{background:var(--field);border:1px solid var(--stroke);color:var(--txt);border-radius:12px;padding:10px;width:100%}
    .mini{padding:8px;border-radius:10px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid var(--stroke);vertical-align:top}
    th{color:var(--muted);font-weight:600;font-size:12px;text-align:left}
    .ok{color:var(--green);font-weight:700}
    .bad{color:var(--red);font-weight:700}
    .msg{margin-top:10px;color:var(--muted);min-height:18px}
    .split{display:grid;grid-template-columns:1.2fr 0.8fr;gap:10px}
    @media (max-width: 520px){ .split{grid-template-columns:1fr} }
    .pill{display:inline-flex;gap:8px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--stroke);background:#0f0f16;color:var(--muted);font-size:12px}
  </style>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/site.css">
</head>
<body>
  <div class="wrap">
    <div id="appMenu" class="row" style="margin-bottom:12px"></div>
    <div class="top">
      <div class="brand">
        <b>Menús</b>
        <span>Productos globales + asignación por barra (con precio override)</span>
      </div>
      <div class="row">
        <a class="btn alt" href="/dashboard.html">← Dashboard</a>
        <button id="btnLogout" class="btn danger">Cerrar sesión</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="split">
        <div>
          <label class="muted">Selecciona barra</label>
          <select id="areaSelect"></select>
        </div>
        <div>
          <label class="muted">Filtro</label>
          <input id="q" class="field" placeholder="Buscar producto / categoría...">
        </div>
      </div>
      <div class="msg" id="msg"></div>
    </div>

    <div class="grid">
      <!-- Productos globales -->
      <div class="card">
        <div class="h">
          <h2>Catálogo global</h2>
          <span class="pill" id="countProducts">0</span>
        </div>

        <div class="split" style="margin-bottom:10px">
          <input id="pName" class="field" placeholder="Nombre (ej: Cerveza)">
          <input id="pPrice" class="field" placeholder="Precio (ej: 80)" inputmode="decimal">
        </div>
        <div class="split" style="margin-bottom:10px">
          <input id="pCategory" class="field" placeholder="Categoría (opcional)">
          <select id="pActive" class="field">
            <option value="true" selected>Activo</option>
            <option value="false">Inactivo</option>
          </select>
        </div>

        <div class="row" style="margin-bottom:12px">
          <button id="btnCreateProduct" class="btn">Crear producto</button>
          <button id="btnReload" class="btn alt">Recargar</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>Producto</th>
              <th>Precio</th>
              <th>Categoría</th>
              <th>Activo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="productsRows"></tbody>
        </table>
      </div>

      <!-- Menú por barra -->
      <div class="card">
        <div class="h">
          <h2>Menú de la barra</h2>
          <span class="pill" id="countMenu">0</span>
        </div>

        <div class="muted" style="margin-bottom:10px">
          Agrega productos del catálogo y define <b>Precio Override</b> si la barra cobra distinto.
        </div>

        <table>
          <thead>
            <tr>
              <th>Producto</th>
              <th>Base</th>
              <th>Override</th>
              <th>Efectivo</th>
              <th>Activo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="menuRows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/common.js"></script>
  <script src="/menus.js"></script>
</body>
</html>
