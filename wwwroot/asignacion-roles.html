<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Asignacion de Roles | Cashless</title>
  <style>
    :root{
      --bg:#0b0b0f; --card:#151520; --muted:#9aa0a6; --txt:#fff;
      --blue:#2f7cff; --alt:#2a2a3a; --line:#22223a; --field:#0f0f16;
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{margin:0;background:var(--bg);color:var(--txt)}
    .wrap{width:min(1200px,96vw);margin:24px auto;padding:0 0 32px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .muted{color:var(--muted);font-size:12px}
    h1{margin:0;font-size:30px}
    .btn{border:0;border-radius:10px;padding:10px 12px;background:#202033;color:#fff;cursor:pointer;font-weight:800}
    .btn.blue{background:var(--blue)}
    .btn.alt{background:var(--alt)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .field{background:var(--field);border:1px solid var(--line);color:#fff;border-radius:10px;padding:10px 12px;outline:none}
    .card{background:linear-gradient(180deg,#141423,#0f0f16);border:1px solid var(--line);border-radius:18px;padding:16px}
    .status{padding:12px 14px;border-radius:12px;border:1px solid #2a2a3a;background:#111122;color:#dfe6ff;margin-bottom:14px}
    .status.ok{border-color:rgba(53,255,122,.35);background:rgba(53,255,122,.06)}
    .status.warn{border-color:rgba(255,197,92,.35);background:rgba(255,197,92,.06);color:#ffe8b8}
    .status.err{border-color:rgba(255,90,90,.35);background:rgba(255,90,90,.07);color:#ffd1d1}
    .stack{display:flex;flex-direction:column;gap:10px}
    .operator{
      display:grid;grid-template-columns:minmax(0,1fr) 180px auto;gap:10px;align-items:center;
      border:1px solid #1f1f33;border-radius:14px;padding:12px;background:#10101a
    }
    @media (max-width:760px){.operator{grid-template-columns:1fr}}
    .name{font-weight:800}
  </style>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/site.css">
</head>
<body>
  <div class="wrap">
    <div id="appMenu" class="row" style="margin-bottom:12px"></div>
    <div class="top">
      <div>
        <div class="muted">Cashless</div>
        <h1>Asignacion de roles</h1>
        <div class="muted">Usa el backend actual de operadores para asignar el rol del colaborador.</div>
      </div>
      <div class="row">
        <a class="btn alt" href="/permisos.html">Permisos por rol</a>
        <button class="btn" id="btnReload">Recargar</button>
      </div>
    </div>

    <div class="card">
      <div id="status" class="status">Cargando...</div>
      <div class="row" style="margin-bottom:12px">
        <input id="q" class="field" placeholder="Buscar colaborador por nombre, rol o ID" style="min-width:280px">
      </div>
      <div id="list" class="stack"></div>
    </div>
  </div>
  <script src="common.js"></script>
  <script src="asignacion-roles.js"></script>
</body>
</html>
