<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Colaboradores · Cashless</title>
  <style>
    :root{
      --bg:#0b0b0f; --card:#151520; --muted:#9aa0a6; --txt:#fff;
      --blue:#2f7cff; --alt:#2a2a3a; --red:#ff5a5a; --green:#35ff7a;
      --field:#0f0f18; --border:#26263a;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
      background:radial-gradient(1200px 700px at 20% 10%, #1a1a33 0%, transparent 55%),
                 radial-gradient(1000px 600px at 80% 80%, #111133 0%, transparent 55%),
                 var(--bg);
      color:var(--txt);
      min-height:100vh;
      padding:24px;
    }
    .wrap{max-width:1200px;margin:0 auto}
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; margin-bottom:18px;
    }
    .brand{display:flex; flex-direction:column; gap:2px}
    .brand b{font-size:18px}
    .brand span{color:var(--muted); font-size:12px}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .btn{
      border:0; cursor:pointer; padding:10px 14px; border-radius:12px;
      background:var(--blue); color:white; font-weight:700;
    }
    .btn.alt{background:var(--alt)}
    .btn.danger{background:var(--red)}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      margin-bottom:14px;
    }
    h2{margin:0 0 12px 0; font-size:18px}
    .muted{color:var(--muted); font-size:12px}
    .field, select{
      background:var(--field); border:1px solid var(--border); color:var(--txt);
      border-radius:12px; padding:10px 12px; outline:none;
    }
    .field{min-width:220px}
    table{width:100%; border-collapse:collapse}
    th,td{padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.06); text-align:left; font-size:13px}
    th{color:var(--muted); font-weight:700; letter-spacing:.04em; text-transform:uppercase; font-size:11px}
    .pill{display:inline-block; padding:4px 10px; border-radius:999px; font-weight:700; font-size:12px}
    .pill.ok{background:rgba(53,255,122,.12); color:var(--green); border:1px solid rgba(53,255,122,.25)}
    .pill.bad{background:rgba(255,90,90,.12); color:var(--red); border:1px solid rgba(255,90,90,.25)}
    .msg{margin-top:10px; font-size:13px; color:var(--muted)}
    .right-tools{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .tiny{font-size:12px; color:var(--muted)}
    a.link{color:#b7d0ff; text-decoration:none}
    a.link:hover{text-decoration:underline}
  </style>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/site.css">
</head>
<body>
  <div class="wrap">
    <div id="appMenu" class="row" style="margin-bottom:12px"></div>

    <div class="topbar">
      <div class="brand">
        <b>Cashless</b>
        <span>Colaboradores (operadores)</span>
      </div>
      <div class="row">
        <button class="btn alt" id="btnDashboard">Dashboard</button>
        <button class="btn alt" id="btnReload">Recargar</button>
        <button class="btn danger" id="btnLogout">Cerrar sesión</button>
      </div>
    </div>

    <div class="card">
      <h2>Nuevo colaborador</h2>
      <div class="row">
        <input class="field" id="name" placeholder="Nombre" />
        <select id="role" class="field" style="min-width:180px">
          <option value="JefeDeBarra">JefeDeBarra</option>
          <option value="JefeDeStand">JefeDeStand</option>
          <option value="JefeOperativo">JefeOperativo</option>
          <option value="Cajero">Cajero</option>
          <option value="Admin">Admin</option>
          <option value="SuperAdmin">SuperAdmin</option>
        </select>
        <input class="field" id="pin" placeholder="PIN (mín. 4)" />
        <input class="field" id="areaId" placeholder="AreaId (ej: 1)" style="min-width:160px" />
        <label class="tiny" style="display:flex;gap:8px;align-items:center">
          <input type="checkbox" id="active" checked />
          Activo
        </label>
        <button class="btn" id="btnCreate">Crear</button>
      </div>
      <div class="muted" style="margin-top:10px">
        Nota: por seguridad, “Eliminar” solo desactiva (soft delete). El PIN se guarda hasheado en la base.
      </div>
      <div class="msg" id="msgCreate"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <h2 style="margin:0">Lista</h2>
        <div class="right-tools">
          <input class="field" id="q" placeholder="Buscar..." style="min-width:240px" />
          <label class="tiny" style="display:flex;gap:8px;align-items:center">
            <input type="checkbox" id="onlyActive" checked />
            Solo activos
          </label>
        </div>
      </div>

      <div class="msg" id="msg"></div>

      <div style="overflow:auto; margin-top:10px">
        <table>
          <thead>
            <tr>
              <th style="width:70px">ID</th>
              <th>Nombre</th>
              <th style="width:160px">Rol</th>
              <th style="width:120px">Estado</th>
              <th style="width:90px">AreaId</th>
              <th style="width:220px">Acciones</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- IMPORTANTE: common.js primero -->
  <script src="/common.js"></script>
  <script src="/operators.js" defer></script>
</body>
</html>
